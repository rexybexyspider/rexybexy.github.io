<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <title>🎵 موسیقی</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- لودر -->
    <div id="loader" class="loader">
        <div class="loader-vinyl">
            <div class="vinyl-record"></div>
        </div>
        <div class="loader-text">در حال اتصال به Audius...</div>
    </div>

    <!-- صفحه اصلی -->
    <div id="main-screen" class="screen">
        <header class="header">
            <div class="header-left">
                <div class="app-title">
                    <span class="app-icon">🎵</span>
                    <span>موسیقی</span>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="profile-btn" title="پروفایل">
                    <span id="my-avatar">🎵</span>
                </button>
            </div>
        </header>

        <!-- نوار جستجو -->
        <div class="search-section">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="سرچ موسیقی یا خواننده..." autocomplete="off">
                <button class="clear-btn" id="clear-search">✕</button>
            </div>
            <div class="search-tags">
                <button class="tag-btn" data-tag="Electronic">الکترونیک</button>
                <button class="tag-btn" data-tag="Hip-Hop">هیپ‌هاپ</button>
                <button class="tag-btn" data-tag="Rock">راک</button>
                <button class="tag-btn" data-tag="Pop">پاپ</button>
                <button class="tag-btn" data-tag="Jazz">جاز</button>
                <button class="tag-btn" data-tag="Classical">کلاسیک</button>
                <button class="tag-btn" data-tag="Ambient">محیطی</button>
                <button class="tag-btn" data-tag="Lo-Fi">لو-فای</button>
            </div>
        </div>

        <!-- محتوا -->
        <main class="content" id="main-content">
            <div class="tabs">
                <button class="tab active" data-tab="discover">🔍 کشف</button>
                <button class="tab" data-tab="trending">🔥 ترند</button>
                <button class="tab" data-tab="history">📜 تاریخچه</button>
                <button class="tab" data-tab="favorites">⭐ علاقه‌مندی</button>
            </div>

            <div class="tab-content active" id="tab-discover">
                <div id="search-results" class="track-list"></div>
                <div id="discover-default" class="discover-default">
                    <div class="empty-art">🎧</div>
                    <h3>موسیقی مورد علاقه‌ات رو سرچ کن</h3>
                    <p>نام خواننده، آهنگ یا ژانر رو بنویس</p>
                    <div style="margin-top: 20px; padding: 16px; background: rgba(108, 92, 231, 0.1); border: 1px solid var(--primary); border-radius: 14px; font-size: 12px; color: var(--text-dim);">
                        🎵 <strong>قدرت گرفته از Audius</strong><br>
                        موسیقی‌ها به‌صورت کامل پخش می‌شن (نه پیش‌نمایش)
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-trending">
                <div id="trending-list" class="track-list">
                    <div class="search-loading">
                        <div class="search-loading-spinner"></div>
                        <span>در حال بارگذاری ترندها...</span>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-history">
                <div id="history-list" class="track-list"></div>
            </div>

            <div class="tab-content" id="tab-favorites">
                <div id="favorites-list" class="track-list"></div>
            </div>
        </main>

        <!-- پلیر پایین -->
        <div class="player-bar hidden" id="player-bar">
            <div class="player-info" id="player-info">
                <img class="player-artwork" id="player-artwork" src="" alt="">
                <div class="player-text">
                    <div class="player-title" id="player-title">—</div>
                    <div class="player-artist" id="player-artist">—</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="prev-btn">⏮</button>
                <button class="control-btn play-btn" id="play-btn">▶</button>
                <button class="control-btn" id="next-btn">⏭</button>
            </div>
            <div class="player-progress">
                <span class="time-text" id="current-time">0:00</span>
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="time-text" id="total-time">0:00</span>
            </div>
        </div>
    </div>

    <!-- صفحه Now Playing -->
    <div id="now-playing" class="screen now-playing hidden">
        <div class="np-background" id="np-background"></div>
        <div class="np-content">
            <button class="np-close" id="np-close">✕</button>
            <div class="np-artwork-container">
                <img class="np-artwork" id="np-artwork" src="" alt="">
                <div class="np-vinyl"></div>
            </div>
            <div class="np-info">
                <div class="np-title" id="np-title">—</div>
                <div class="np-artist" id="np-artist">—</div>
                <div class="np-genre" id="np-genre"></div>
            </div>
            <div class="np-progress">
                <div class="np-progress-bar">
                    <div class="np-progress-fill" id="np-progress-fill"></div>
                </div>
                <div class="np-times">
                    <span id="np-current">0:00</span>
                    <span id="np-total">0:00</span>
                </div>
            </div>
            <div class="np-controls">
                <button class="np-control-btn" id="np-prev">⏮</button>
                <button class="np-control-btn np-play-btn" id="np-play">▶</button>
                <button class="np-control-btn" id="np-next">⏭</button>
            </div>
            <div class="np-actions">
                <button class="np-action-btn" id="np-favorite">⭐ علاقه‌مندی</button>
                <button class="np-action-btn" id="np-share">📤 اشتراک‌گذاری</button>
                <button class="np-action-btn" id="np-download">⬇ دانلود</button>
            </div>
        </div>
    </div>

    <!-- مودال پروفایل -->
    <div id="modal-profile" class="modal hidden">
        <div class="modal-content">
            <h3>👤 پروفایل من</h3>
            <div class="profile-section">
                <label>نام نمایشی</label>
                <input type="text" id="profile-name" placeholder="اسم شما" />
            </div>
            <div class="profile-section">
                <label>آواتار (ایموجی)</label>
                <div class="emoji-picker" id="emoji-picker">
                    <button>🎵</button><button>🎧</button><button>🎤</button>
                    <button>🎸</button><button>🎹</button><button>🥁</button>
                    <button>🎺</button><button>🎷</button><button>🪕</button>
                    <button>🤖</button><button>🐱</button><button>🦊</button>
                    <button>🌟</button><button>🔥</button><button>💎</button>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" id="profile-cancel">بستن</button>
                <button class="btn-primary" id="profile-save">ذخیره</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
