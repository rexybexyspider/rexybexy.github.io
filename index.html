<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دنا — چرخه من</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');

  :root {
    --rose:    #E8728A;
    --rose-lt: #F4A7B9;
    --rose-dk: #C4506A;
    --blush:   #FDF0F3;
    --lavender:#C9A8C4;
    --lav-lt:  #EDE0EC;
    --cream:   #FFF8F9;
    --ink:     #3D2035;
    --ink-50:  #7A5070;
    --ink-30:  #B898AE;
    --safe:    #78C9A0;
    --fertile: #A8C9F0;
    --period:  #E8728A;
    --pms:     #C9A8C4;
    --shadow:  0 4px 24px rgba(61,32,53,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Vazirmatn', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

  .header { background: linear-gradient(135deg, var(--rose-dk) 0%, var(--rose) 50%, var(--rose-lt) 100%); padding: 28px 20px 80px; position: relative; }
  .header-top { display:flex; justify-content:space-between; align-items:center; }
  .logo { font-size:22px; font-weight:700; color:#fff; }
  .logo span { opacity:.7; font-weight:300; }
  .header-greeting { margin-top:20px; }
  .greeting-sub { font-size:13px; color:rgba(255,255,255,.8); }
  .greeting-main { font-size:24px; font-weight:700; color:#fff; margin-top:4px; }

  .status-card { margin: -48px 16px 0; background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); position: relative; z-index: 10; }
  .status-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .cycle-day-badge { background: linear-gradient(135deg, var(--rose), var(--rose-dk)); color:#fff; border-radius:12px; padding:6px 14px; font-size:13px; font-weight:600; }
  .phase-label { font-size:11px; color:var(--ink-30); font-weight:500; }
  .phase-name { font-size:17px; font-weight:700; color:var(--ink); }
  .status-bar { margin-top:16px; }
  .status-bar-track { height:8px; background:var(--lav-lt); border-radius:4px; overflow:hidden; }
  .status-bar-fill { height:100%; background:linear-gradient(90deg, var(--rose), var(--lavender)); transition: width .8s; }
  .status-meta { display:flex; justify-content:space-between; margin-top:8px; font-size:12px; color:var(--ink-30); }
  .next-info { display:flex; gap:12px; margin-top:16px; }
  .next-box { flex:1; background:var(--blush); border-radius:12px; padding:12px; text-align:center; }
  .next-box .nb-val { font-size:22px; font-weight:700; color:var(--rose-dk); }
  .next-box .nb-lbl { font-size:11px; color:var(--ink-50); margin-top:2px; }

  .nav-tabs { display:flex; margin:20px 16px 0; background:#fff; border-radius:14px; padding:4px; box-shadow:0 2px 8px rgba(61,32,53,.06); }
  .tab { flex:1; padding:10px; border:none; background:transparent; font-family:inherit; font-size:13px; color:var(--ink-50); border-radius:10px; cursor:pointer; }
  .tab.active { background:linear-gradient(135deg,var(--rose),var(--rose-dk)); color:#fff; font-weight:600; }

  .page { display:none; padding:16px; }
  .page.active { display:block; }

  .calendar-card { background:#fff; border-radius:20px; padding:20px; box-shadow:var(--shadow); }
  .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .cal-nav { background:none; border:none; color:var(--rose); font-size:20px; padding:4px 8px; }
  .cal-month { font-size:17px; font-weight:700; color:var(--ink); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-dow { text-align:center; font-size:11px; font-weight:600; color:var(--ink-30); padding:6px 0; }
  .cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:50%; font-size:13px; cursor:pointer; }
  .cal-day.today { border:2px solid var(--rose); color:var(--rose); font-weight:700; }
  .cal-day.period { background:var(--period); color:#fff; }
  .cal-day.fertile { background:var(--fertile); color:var(--ink); }
  .cal-day.pms { background:var(--pms); color:#fff; }
  .cal-day.predicted { background:rgba(232,114,138,.15); border:1.5px dashed var(--rose); }
  .cal-day.ovulation { background:var(--safe); color:#fff; }

  .log-btn { width:100%; margin-top:16px; padding:16px; background:linear-gradient(135deg,var(--rose),var(--rose-dk)); color:#fff; border:none; border-radius:14px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; display:flex; justify-content:center; gap:8px; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:flex-end; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:#fff; border-radius:24px 24px 0 0; padding:24px; width:100%; transform:translateY(100%); transition:transform .3s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-actions { display:flex; gap:10px; margin-top:15px; }
  .btn-cancel { flex:1; padding:14px; border-radius:12px; background:var(--lav-lt); border:none; font-family:inherit; font-size:14px; }
  .btn-confirm { flex:2; padding:14px; border-radius:12px; background:linear-gradient(135deg,var(--rose),var(--rose-dk)); color:#fff; border:none; font-family:inherit; font-size:14px; font-weight:700; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">دُنا <span>| چرخه من</span></div>
  </div>
  <div class="header-greeting">
    <div class="greeting-sub" id="greetingSub">دستیار چرخه قاعدگی شما</div>
    <div class="greeting-main" id="greetingMain">در حال بارگذاری...</div>
  </div>
</div>

<div class="status-card">
  <div class="status-top">
    <div>
      <div class="phase-label">مرحله فعلی</div>
      <div class="phase-name" id="phaseName">—</div>
    </div>
    <div class="cycle-day-badge" id="cycleDayBadge">روز —</div>
  </div>
  <div class="status-bar">
    <div class="status-bar-track"><div class="status-bar-fill" id="statusBarFill" style="width:0%"></div></div>
  </div>
  <div class="next-info" style="margin-top:20px; font-size:13px; text-align:center; color:var(--ink-50)">
    برای ثبت دقیق‌تر، از دکمه‌های تقویم استفاده کنید.
  </div>
</div>

<div class="nav-tabs">
  <button class="tab active" onclick="showPage('calendar')">📅 تقویم شمسی</button>
</div>

<div class="page active" id="page-calendar">
  <div class="calendar-card">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(1)">‹</button>
      <div class="cal-month" id="calMonthLabel">—</div>
      <button class="cal-nav" onclick="changeMonth(-1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="logModal">
  <div class="modal">
    <div style="font-weight:bold; font-size:18px; margin-bottom:10px;">🌸 ثبت قاعدگی در ربات</div>
    <div id="modalDate" style="color:gray; font-size:14px;">تاریخ —</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('logModal').classList.remove('open')">لغو</button>
      <button class="btn-confirm" onclick="confirmLog()">✅ ثبت کن و ببند</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// همگام‌سازی دیتابیس از طریق URL
const urlParams = new URLSearchParams(window.location.search);
let logs = [];
if (urlParams.has('logs') && urlParams.get('logs') !== "") {
    logs = urlParams.get('logs').split(',');
}

const CYCLE = 28, PERIOD_DAYS = 5, FERTILE_START = 10, FERTILE_END = 17, OVULATION = 14, PMS_START = 21;

// تقویم شمسی با Jalaali-js
const JALALI_MONTHS = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
const DOW = ['ش','ی','د','س','چ','پ','ج'];

const todayG = new Date();
const todayJ = jalaali.toJalaali(todayG);
let currentJy = todayJ.jy;
let currentJm = todayJ.jm;

function persianNum(n) { return String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]); }
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function getLastLog() {
  return logs.length ? new Date(logs[0]) : null; // ربات لاگ‌ها را برعکس (جدید به قدیم) می‌فرستد
}

function getDayClass(dateS, lastLog) {
  if (!lastLog) return '';
  const d = new Date(dateS);
  const last = new Date(lastLog);
  const diff = Math.floor((d - last) / 86400000);
  const cyclePos = ((diff % CYCLE) + CYCLE) % CYCLE + 1;

  if (logs.includes(dateS)) return 'period';
  
  const today = new Date(); today.setHours(0,0,0,0);
  if (d > today) {
    if (cyclePos >= 1 && cyclePos <= PERIOD_DAYS) return 'predicted';
    if (cyclePos >= FERTILE_START && cyclePos <= FERTILE_END) return 'fertile';
    if (cyclePos === OVULATION) return 'ovulation';
    if (cyclePos >= PMS_START) return 'pms';
    return '';
  }
  if (diff >= 0 && diff < PERIOD_DAYS) return 'period';
  return '';
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${JALALI_MONTHS[currentJm-1]} ${persianNum(currentJy)}`;
  
  const grid = document.getElementById('calGrid');
  grid.innerHTML = DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // پیدا کردن روز اول ماه جلالی
  const firstDayG = jalaali.toGregorian(currentJy, currentJm, 1);
  const firstDayDate = new Date(firstDayG.gy, firstDayG.gm-1, firstDayG.gd);
  const startDow = (firstDayDate.getDay() + 1) % 7;
  const monthLength = jalaali.jalaaliMonthLength(currentJy, currentJm);

  for (let i=0; i<startDow; i++) grid.innerHTML += `<div class="cal-day empty"></div>`;

  const lastLog = getLastLog() ? dateStr(getLastLog()) : null;

  for (let d=1; d<=monthLength; d++) {
    const g = jalaali.toGregorian(currentJy, currentJm, d);
    const gDate = new Date(g.gy, g.gm-1, g.gd);
    const ds = dateStr(gDate);
    const isToday = (currentJy === todayJ.jy && currentJm === todayJ.jm && d === todayJ.jd);
    const cls = getDayClass(ds, lastLog);

    grid.innerHTML += `<div class="cal-day ${cls} ${isToday?'today':''}" onclick="openLogModal('${ds}', ${currentJy}, ${currentJm}, ${d})">${persianNum(d)}</div>`;
  }

  // آپدیت کارد بالایی
  if (lastLog) {
      const diff = Math.floor((todayG - new Date(lastLog)) / 86400000) + 1;
      document.getElementById('cycleDayBadge').textContent = `روز ${persianNum(diff)}`;
      document.getElementById('statusBarFill').style.width = `${Math.min(diff/CYCLE*100,100)}%`;
      document.getElementById('phaseName').textContent = diff <= 5 ? 'قاعدگی 🩸' : 'در چرخه ✨';
      document.getElementById('greetingMain').textContent = `اطلاعات با ربات همگام شد 💕`;
  } else {
      document.getElementById('greetingMain').textContent = `هنوز ثبتی در ربات ندارید 💕`;
  }
}

function changeMonth(dir) {
  currentJm += dir;
  if (currentJm > 12) { currentJm = 1; currentJy++; }
  if (currentJm < 1) { currentJm = 12; currentJy--; }
  renderCalendar();
}

let pendingDate = null;
function openLogModal(ds, jy, jm, jd) {
  if (new Date(ds) > new Date()) return; // آینده را نمی‌توان ثبت کرد
  pendingDate = ds;
  document.getElementById('modalDate').textContent = `تاریخ شمسی: ${persianNum(jd)} ${JALALI_MONTHS[jm-1]} ${persianNum(jy)}`;
  document.getElementById('logModal').classList.add('open');
}

function confirmLog() {
  if (!pendingDate || !tg) return;
  // ارسال داده به ربات و بستن پنجره
  tg.sendData(JSON.stringify({ action: 'log', date: pendingDate }));
  tg.close();
}

renderCalendar();
</script>
</body>
</html>
