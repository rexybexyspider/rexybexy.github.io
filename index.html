<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دنا — داشبورد و تقویم چرخه قاعدگی</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --rose: #E8728A;
      --rose-light: #FFEFF2;
      --rose-dark: #C4506A;
      --purple: #A569BD;
      --purple-light: #F5EEF8;
      --purple-dark: #7D3C98;
      --bg: #FDF6F7;
      --card-bg: #FFFFFF;
      --text: #3D2035;
      --text-muted: #8A7382;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .countdown-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(232, 114, 138, 0.12);
      border: 1px solid rgba(232, 114, 138, 0.15);
    }

    .countdown-title {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .countdown-timer {
      font-size: 28px;
      font-weight: 800;
      color: var(--rose);
      direction: rtl;
      margin: 12px 0;
      text-shadow: 0 2px 8px rgba(232, 114, 138, 0.2);
    }

    .status-badge {
      font-size: 13px;
      background: var(--rose-light);
      color: var(--rose-dark);
      padding: 6px 16px;
      border-radius: 50px;
      display: inline-block;
      font-weight: 600;
    }

    .details-card {
      background: var(--card-bg);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(61,32,53,0.02);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
    }

    .detail-row.period-range {
      background: var(--rose-light);
      border-right: 4px solid var(--rose);
    }

    .detail-row.fertile-range {
      background: var(--purple-light);
      border-right: 4px solid var(--purple);
    }

    .detail-label {
      font-weight: 700;
      color: var(--text);
    }

    .detail-value {
      font-weight: 600;
    }

    .calendar-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(61, 32, 53, 0.03);
      border: 1px solid rgba(232, 114, 138, 0.05);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calendar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .nav-btn {
      background: var(--rose-light);
      border: none;
      color: var(--rose-dark);
      width: 36px;
      height: 36px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .nav-btn:active {
      transform: scale(0.9);
    }

    .weekdays-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      row-gap: 12px;
      text-align: center;
    }

    /* استایل‌های غیرقابل کلیک برای تقویم */
    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 500;
      border-radius: 50%;
      cursor: default; /* جلوگیری از تغییر نشانگر موس */
      position: relative;
      user-select: none;
    }

    .day-cell.period {
      background-color: var(--rose);
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(232, 114, 138, 0.4);
    }

    .day-cell.fertile {
      background-color: #EBDEF0;
      color: var(--purple-dark);
      font-weight: 600;
    }

    .day-cell.today-match {
      border: 2px solid var(--text);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .section-card {
      background: var(--card-bg);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 6px 20px rgba(61,32,53,0.02);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 16px;
      color: var(--text);
    }

    .cycle-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #FDF0F3;
    }

    .cycle-item:last-child {
      border-bottom: none;
    }

    .cycle-date {
      font-weight: 500;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="countdown-card">
      <div class="countdown-title">🌸 زمان باقی‌مانده تا شروع سیکل بعدی شما</div>
      <div class="countdown-timer" id="liveTimer">-- روز و -- ساعت و -- دقیقه</div>
      <div class="status-badge" id="statusBadge">در حال دریافت داده‌ها...</div>
    </div>

    <div class="details-card">
      <div class="section-title" style="margin-bottom: 4px;">📊 تحلیل وضعیت و بازه‌های سیکل فعلی</div>
      <div id="cycleDetailsContainer"></div>
    </div>

    <div class="calendar-card">
      <div class="calendar-header">
        <button class="nav-btn" onclick="prevMonth()">▶</button>
        <div class="calendar-title" id="currentMonthYear">-- ۱۴۰۵</div>
        <button class="nav-btn" onclick="nextMonth()">◀</button>
      </div>

      <div class="weekdays-grid">
        <div>ش</div><div>ی</div><div>د</div><div>س</div><div>چ</div><div>پ</div><div>ج</div>
      </div>

      <div class="days-grid" id="calendarDaysGrid"></div>

      <div class="legend">
        <div class="legend-item">
          <div class="legend-color" style="background: var(--rose);"></div>
          <span>شروع قاعدگی</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #EBDEF0;"></div>
          <span>تخمک‌گذاری و بارداری 🔥</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="border: 2px solid var(--text);"></div>
          <span>امروز</span>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">🩸 تاریخ‌های ثبت‌شده اخیر شما</div>
      <p style="font-size:12px; color:var(--text-muted); margin-top:-10px; margin-bottom:12px;">برای مدیریت چرخه‌ها از داخل خود ربات دکمه "مدیریت چرخه‌ها" را بزنید.</p>
      <div id="cycleList"></div>
    </div>

  </div>

  <script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function g2j(gy, gm, gd) {
      let g_d_m = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 335];
      let gy2 = (gm > 2) ? (gy + 1) : gy;
      let days = 355666 + (365 * gy) + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) + gd + g_d_m[gm - 1];
      let jy = -1595 + (33 * Math.floor(days / 12053)); days %= 12053;
      jy += 4 * Math.floor(days / 1461); days %= 1461;
      if (days > 365) { jy += Math.floor((days - 1) / 365); days = (days - 1) % 365; }
      let jm = (days < 186) ? (1 + Math.floor(days / 31)) : (7 + Math.floor((days - 186) / 30));
      let jd = 1 + ((days < 186) ? (days % 31) : ((days - 186) % 30));
      return { jy, jm, jd };
    }

    function j2g(jy, jm, jd) {
      let jy2 = jy + 1595;
      let days = -1634243 + (365 * jy2) + Math.floor(jy2 / 33) * 12053 + Math.floor(((jy2 % 33) + 3) / 4);
      for (let i = 0; i < jm - 1; ++i) days += (i < 6) ? 31 : 30;
      days += jd;
      let gy = 1 + 4 * Math.floor(days / 146097); days %= 146097;
      if (days > 36524) { gy += 100 * Math.floor(--days / 36524); days %= 36524; if (days >= 365) days++; }
      gy += 4 * Math.floor(days / 1461); days %= 1461;
      if (days > 365) { gy += Math.floor((days - 1) / 365); days = (days - 1) % 365; }
      let gd = days + 1;
      let sal_a = [0, 31, ((gy % 4 == 0 && gy % 100 != 0) || gy % 400 == 0) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
      let gm; for (gm = 0; gm < 13 && gd > sal_a[gm]; gm++) gd -= sal_a[gm];
      return { gy, gm, gd };
    }

    const JALALI_MONTHS = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];

    function toPersianNum(num) {
      const id = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
      return num.toString().replace(/[0-9]/g, function(w){ return id[+w]; });
    }

    function formatDateStr(dateObj) {
      return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
    }

    const urlParams = new URLSearchParams(window.location.search);
    let logs = urlParams.get('logs') ? urlParams.get('logs').split(',').filter(Boolean) : [];
    
    let todayG = new Date();
    let todayJ = g2j(todayG.getFullYear(), todayG.getMonth() + 1, todayG.getDate());
    let currentYear = todayJ.jy;
    let currentMonth = todayJ.jm;

    function getJalaliMonthDays(jy, jm) {
      if (jm <= 6) return 31;
      if (jm <= 11) return 30;
      let g1 = j2g(jy, 12, 1);
      let g2 = j2g(jy + 1, 1, 1);
      let d1 = new Date(g1.gy, g1.gm - 1, g1.gd);
      let d2 = new Date(g2.gy, g2.gm - 1, g2.gd);
      return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
    }

    function checkIsFertile(dateStr) {
      let currentCellTime = new Date(dateStr).setHours(0,0,0,0);
      for (let log of logs) {
        let logDate = new Date(log);
        let fertileStart = new Date(logDate);
        fertileStart.setDate(logDate.getDate() + 10);
        let fertileEnd = new Date(logDate);
        fertileEnd.setDate(logDate.getDate() + 15);

        if (currentCellTime >= fertileStart.setHours(0,0,0,0) && currentCellTime <= fertileEnd.setHours(0,0,0,0)) {
          return true;
        }
      }
      return false;
    }

    function renderCustomCalendar() {
      const grid = document.getElementById('calendarDaysGrid');
      document.getElementById('currentMonthYear').textContent = `${JALALI_MONTHS[currentMonth - 1]} ${toPersianNum(currentYear)}`;
      grid.innerHTML = '';

      let firstDayG = j2g(currentYear, currentMonth, 1);
      let firstDayDate = new Date(firstDayG.gy, firstDayG.gm - 1, firstDayG.gd);
      let startWeekdayIdx = (firstDayDate.getDay() + 1) % 7; 

      let totalDays = getJalaliMonthDays(currentYear, currentMonth);

      for (let i = 0; i < startWeekdayIdx; i++) {
        let emptyCell = document.createElement('div');
        emptyCell.className = 'day-cell empty';
        grid.appendChild(emptyCell);
      }

      for (let day = 1; day <= totalDays; day++) {
        let cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.textContent = toPersianNum(day);

        let dayG = j2g(currentYear, currentMonth, day);
        let dateStr = formatDateStr(new Date(dayG.gy, dayG.gm - 1, dayG.gd));

        if (logs.includes(dateStr)) {
          cell.classList.add('period');
        } else if (checkIsFertile(dateStr)) {
          cell.classList.add('fertile');
        }

        if (currentYear === todayJ.jy && currentMonth === todayJ.jm && day === todayJ.jd) {
          cell.classList.add('today-match');
        }

        grid.appendChild(cell);
      }
    }

    function prevMonth() {
      currentMonth--;
      if (currentMonth < 1) { currentMonth = 12; currentYear--; }
      renderCustomCalendar();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; }
      renderCustomCalendar();
    }

    function toJalaliFullStr(dateStr) {
      let parts = dateStr.split('-');
      let res = g2j(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
      return `${toPersianNum(res.jd)} ${JALALI_MONTHS[res.jm - 1]} ${toPersianNum(res.jy)}`;
    }

    function renderCycleDetailsText() {
      const container = document.getElementById('cycleDetailsContainer');
      if (logs.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:13px; margin: 10px 0;">🌸 برای مشاهده بازه‌های دقیق قاعدگی و تخمک‌گذاری، لطفاً تاریخ شروع چرخه خود را در ربات ثبت کنید.</p>`;
        return;
      }

      let sortedLogs = [...logs].sort((a, b) => new Date(a) - new Date(b));
      let lastLogDate = new Date(sortedLogs[sortedLogs.length - 1]);

      let periodEnd = new Date(lastLogDate);
      periodEnd.setDate(lastLogDate.getDate() + 4);

      let fertileStart = new Date(lastLogDate);
      fertileStart.setDate(lastLogDate.getDate() + 10);
      let fertileEnd = new Date(lastLogDate);
      fertileEnd.setDate(lastLogDate.getDate() + 15);

      container.innerHTML = `
        <div class="detail-row period-range">
          <span class="detail-label">🩸 بازه قاعدگی کنونی:</span>
          <span class="detail-value" style="color: var(--rose-dark);">${toJalaliFullStr(formatDateStr(lastLogDate))} تا ${toJalaliFullStr(formatDateStr(periodEnd))}</span>
        </div>
        <div class="detail-row fertile-range">
          <span class="detail-label">✨ تخمک‌گذاری و بارداری:</span>
          <span class="detail-value" style="color: var(--purple-dark);">${toJalaliFullStr(formatDateStr(fertileStart))} تا ${toJalaliFullStr(formatDateStr(fertileEnd))}</span>
        </div>
      `;
    }

    function calculateLiveCountdown() {
      const timerElement = document.getElementById('liveTimer');
      const badgeElement = document.getElementById('statusBadge');

      if (logs.length === 0) {
        timerElement.textContent = "چرخه‌ای ثبت نشده است";
        badgeElement.textContent = "⬜ در انتظار دریافت اطلاعات از ربات...";
        return;
      }

      let sortedLogs = [...logs].sort((a, b) => new Date(a) - new Date(b));
      let lastLogDate = new Date(sortedLogs[sortedLogs.length - 1]);
      
      let now = new Date();
      let cycleLength = 28;

      let nextCycleDate = new Date(lastLogDate);
      nextCycleDate.setDate(lastLogDate.getDate() + cycleLength);

      while (now > nextCycleDate) {
        nextCycleDate.setDate(nextCycleDate.getDate() + cycleLength);
      }

      let diffMs = nextCycleDate - now;
      let diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      let diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      let diffMinutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));

      timerElement.innerHTML = `${toPersianNum(diffDays)} روز و ${toPersianNum(diffHours)} ساعت و ${toPersianNum(diffMinutes)} دقیقه`;

      if (diffDays <= 3) {
        badgeElement.textContent = "⚠️ نزدیک به شروع سیکل بعدی (مراقب خودت باش) 💕";
        badgeElement.style.background = "#FADBD8";
        badgeElement.style.color = "#C0392B";
      } else if (diffDays >= 23) {
        badgeElement.textContent = "🩸 شما در روزهای ابتدایی دوره جدید هستید.";
        badgeElement.style.background = "var(--rose-light)";
        badgeElement.style.color = "var(--rose-dark)";
      } else {
        badgeElement.textContent = "🌿 بدن شما در وضعیت آرامش و ثبات است.";
        badgeElement.style.background = "#E8F8F5";
        badgeElement.style.color = "#117A65";
      }
    }

    function renderLogList() {
      let sortedLogs = [...logs].sort((a, b) => new Date(b) - new Date(a));
      const container = document.getElementById('cycleList');
      
      if (sortedLogs.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:10px;">تا کنون تاریخی در ربات ثبت نشده است</div>';
        return;
      }

      container.innerHTML = sortedLogs.slice(0, 5).map(date => `
        <div class="cycle-item">
          <div class="cycle-date">🩸 شروع قاعدگی: <span style="color:var(--rose-dark); font-weight:700;">${toJalaliFullStr(date)}</span></div>
        </div>
      `).join('');
    }

    function renderAllComponents() {
      renderCustomCalendar();
      renderCycleDetailsText();
      renderLogList();
      calculateLiveCountdown();
    }

    renderAllComponents();
    setInterval(calculateLiveCountdown, 60000);
  </script>
</body>
</html>
