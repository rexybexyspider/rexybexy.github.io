<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دنا — مدیریت چرخه قاعدگی</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
    
    :root {
      --rose: #E8728A;
      --rose-light: #FFEFF2;
      --rose-dark: #C4506A;
      --bg: #FDF6F7;
      --card-bg: #FFFFFF;
      --text: #3D2035;
      --text-muted: #8A7382;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* کارت تایمر معکوس شیک صورتی */
    .countdown-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(232, 114, 138, 0.1);
      border: 1px solid rgba(232, 114, 138, 0.15);
      position: relative;
      overflow: hidden;
    }

    .countdown-timer {
      font-size: 50px;
      font-weight: 800;
      color: var(--rose);
      margin: 8px 0;
      text-shadow: 0 4px 12px rgba(232, 114, 138, 0.25);
    }

    .countdown-label {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* نوار وضعیت عمودی که از بالا به پایین کم می‌شود */
    .vertical-progress-container {
      width: 14px;
      height: 130px;
      background: var(--rose-light);
      border-radius: 50px;
      margin: 16px auto;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(232, 114, 138, 0.1);
    }

    .vertical-progress-bar {
      width: 100%;
      background: linear-gradient(to top, var(--rose), var(--rose-dark));
      position: absolute;
      bottom: 0;
      left: 0;
      transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50px;
    }

    /* دکمه‌های جدید و صورتی دنا */
    .btn {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--rose);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 6px 20px rgba(232, 114, 138, 0.3);
      width: 100%;
      box-sizing: border-box;
    }

    .btn:active {
      transform: scale(0.98);
      box-shadow: 0 3px 10px rgba(232, 114, 138, 0.2);
    }

    .section-card {
      background: var(--card-bg);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 6px 20px rgba(61,32,53,0.02);
      border: 1px solid rgba(61,32,53,0.02);
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }

    /* لیست چرخه‌ها و مدیریت دکمه حذف */
    .cycle-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #FDF0F3;
    }

    .cycle-item:last-child {
      border-bottom: none;
    }

    .cycle-date {
      font-weight: 500;
      font-size: 15px;
    }

    .btn-delete {
      background: #FDEDEC;
      border: none;
      color: #E74C3C;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .btn-delete:active {
      background: #FADBD8;
    }

    /* فیلد انتخاب تاریخ خوشگل */
    .date-picker-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="date"] {
      font-family: 'Vazirmatn', sans-serif;
      padding: 12px 16px;
      border: 2px solid #F5ECEF;
      border-radius: 14px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      text-align: center;
      background-color: var(--bg);
      transition: border-color 0.2s;
    }

    input[type="date"]:focus {
      border-color: var(--rose);
    }

    /* اعلان شناور پیام موفقیت */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #3D2035;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="countdown-card">
      <div class="countdown-label">🌸 روزهای باقی‌مانده تا سیکل بعدی</div>
      <div class="vertical-progress-container">
        <div class="vertical-progress-bar" id="progressBar" style="height: 100%;"></div>
      </div>
      <div class="countdown-timer" id="countdownTimer">--</div>
      <div class="countdown-label" id="statusMessage">در حال محاسبه وضعیت...</div>
    </div>

    <div class="section-card">
      <div class="section-title">➕ ثبت چرخه جدید</div>
      <div class="date-picker-wrapper">
        <label style="font-size: 13px; color: var(--text-muted);">تاریخ شروع قاعدگی مورد نظر را انتخاب کنید:</label>
        <input type="date" id="cycleDateInput">
      </div>
      <button class="btn" onclick="addNewCycle()">💖 ثبت این تاریخ در تقویم دُنا</button>
    </div>

    <div class="section-card">
      <div class="section-title">🗓 تاریخ‌های ثبت‌شده شما</div>
      <div id="cycleList">
        </div>
    </div>

  </div>

  <div class="toast" id="toast">پیام تایید</div>

  <script>
    let tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // دریافت اطلاعات چرخه‌ها از ربات
    const urlParams = new URLSearchParams(window.location.search);
    let logs = urlParams.get('logs') ? urlParams.get('logs').split(',').filter(Boolean) : [];
    
    if (logs.length === 0 && localStorage.getItem('user_cycles')) {
      logs = JSON.parse(localStorage.getItem('user_cycles'));
    }

    function saveToLocal() {
      localStorage.setItem('user_cycles', JSON.stringify(logs));
    }
    saveToLocal();

    function toPersianNum(num) {
      const id = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
      return num.toString().replace(/[0-9]/g, function(w){ return id[+w]; });
    }

    const JALALI_MONTHS = [
      'فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور',
      'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'
    ];

    function toJalaliStr(dateStr) {
      if(!dateStr) return '';
      const gDate = new Date(dateStr);
      let gy = gDate.getFullYear();
      let gm = gDate.getMonth() + 1;
      let gd = gDate.getDate();

      let g_d_m = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 335];
      let gy2 = (gm > 2) ? (gy + 1) : gy;
      let days = 355666 + (365 * gy) + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) + gd + g_d_m[gm - 1];
      let jy = -1595 + (33 * Math.floor(days / 12053));
      days %= 12053;
      jy += 4 * Math.floor(days / 1461);
      days %= 1461;
      if (days > 365) {
        jy += Math.floor((days - 1) / 365);
        days = (days - 1) % 365;
      }
      let jm = (days < 186) ? (1 + Math.floor(days / 31)) : (7 + Math.floor((days - 186) / 30));
      let jd = 1 + ((days < 186) ? (days % 31) : ((days - 186) % 30));

      return `${toPersianNum(jd)} ${JALALI_MONTHS[jm-1]} ${toPersianNum(jy)}`;
    }

    // پیش‌فرض قرار دادن تاریخ امروز در فیلد ورودی
    document.getElementById('cycleDateInput').value = new Date().toISOString().split('T')[0];

    // تابع آپدیت هوشمند تایمر صورتی عمودی معکوس
    function updateDashboard() {
      if (logs.length === 0) {
        document.getElementById('countdownTimer').textContent = '۰';
        document.getElementById('statusMessage').textContent = 'هیچ چرخه قاعدگی ثبت نشده است.';
        document.getElementById('progressBar').style.height = '0%';
        return;
      }

      let sortedLogs = [...logs].sort((a, b) => new Date(a) - new Date(b));
      let lastLogStr = sortedLogs[sortedLogs.length - 1];
      
      let lastDate = new Date(lastLogStr);
      let today = new Date();
      today.setHours(0,0,0,0);
      lastDate.setHours(0,0,0,0);

      let cycleLength = 28; 
      let nextCycle = new Date(lastDate);
      nextCycle.setDate(lastDate.getDate() + cycleLength);

      while (today > nextCycle) {
        nextCycle.setDate(nextCycle.getDate() + cycleLength);
      }

      let timeDiff = nextCycle - today;
      let daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

      // محاسبه نوار پیشرفت رو به پایین
      let progressPercent = ((cycleLength - daysLeft) / cycleLength) * 100;
      if (progressPercent < 0) progressPercent = 0;
      if (progressPercent > 100) progressPercent = 100;

      document.getElementById('countdownTimer').textContent = toPersianNum(daysLeft) + ' روز';
      document.getElementById('progressBar').style.height = (100 - progressPercent) + '%';

      if (daysLeft <= 3) {
        document.getElementById('statusMessage').textContent = '⚠️ نزدیک به شروع سیکل بعدی شما';
      } else {
        document.getElementById('statusMessage').textContent = '🌿 وضعیت چرخه بدن شما ایده‌آل و منظم است.';
      }
    }

    function renderList() {
      let sortedLogs = [...logs].sort((a, b) => new Date(b) - new Date(a));
      const container = document.getElementById('cycleList');
      
      if (sortedLogs.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:14px; padding:10px;">تاریخی ثبت نشده است</div>';
        return;
      }

      container.innerHTML = sortedLogs.map(date => `
        <div class="cycle-item">
          <div class="cycle-date">🩸 ${toJalaliStr(date)}</div>
          <button class="btn-delete" onclick="deleteCycle('${date}')">🗑 حذف</button>
        </div>
      `).join('');
    }

    // عملکرد افزودن چرخه جدید و ارسال آنی داده به ربات دنا
    function addNewCycle() {
      const input = document.getElementById('cycleDateInput');
      const selectedDate = input.value;

      if (!selectedDate) {
        showToast('⚠️ لطفا یک تاریخ معتبر انتخاب کنید.');
        return;
      }

      if (logs.includes(selectedDate)) {
        showToast('ℹ️ این تاریخ قبلاً ثبت شده است.');
        return;
      }

      logs.push(selectedDate);
      saveToLocal();
      updateDashboard();
      renderList();

      // ارسال مستقیم به ربات
      if (tg) {
        tg.sendData(JSON.stringify({ action: 'log', date: selectedDate }));
      }

      showToast('✅ چرخه جدید با موفقیت ثبت شد 🌸');
    }

    // عملکرد حذف چرخه و ارسال اطلاعات به ربات دنا
    function deleteCycle(date) {
      if (!confirm('آیا از حذف این تاریخ مطمئن هستید؟')) return;

      logs = logs.filter(l => l !== date);
      saveToLocal();
      updateDashboard();
      renderList();

      if (tg) {
        tg.sendData(JSON.stringify({ action: 'delete', date: date }));
      }

      showToast('🗑 تاریخ با موفقیت حذف شد.');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    updateDashboard();
    renderList();
  </script>
</body>
</html>
